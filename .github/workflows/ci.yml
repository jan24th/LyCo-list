name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install --registry https://registry.npmmirror.com
      - run: bunx @biomejs/biome ci

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install --registry https://registry.npmmirror.com
      - run: bun typecheck

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install --registry https://registry.npmmirror.com
      - run: bun run test
