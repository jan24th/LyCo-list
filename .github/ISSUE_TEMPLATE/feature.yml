name: 功能需求
description: 创建一个产品功能或用户场景 ticket
title: "feat: "
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 说明用户场景、问题和关联设计章节。
      placeholder: 例如：家庭成员需要在创建任务时分配给多个人。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 列出本 Issue 需要完成的前后端、共享包、基础设施或文档改动。
      placeholder: |
        - packages/shared: ...
        - apps/api: ...
        - apps/web: ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 使用可验证的清单描述完成条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: 测试要求
      description: 写明 TDD 测试、覆盖率、边界场景和需要固定的时间/时区。
      placeholder: |
        - [ ] 先写失败测试
        - [ ] bun test
        - [ ] bun coverage 达到 100%
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: 关联资料
      description: 关联设计文档、实施计划或依赖 Issue。
      placeholder: |
        - 设计：.lychee/artifacts/designs/2026-07-13-lyco-list-design.md#...
        - 计划：.lychee/artifacts/plans/...
    validations:
      required: false
