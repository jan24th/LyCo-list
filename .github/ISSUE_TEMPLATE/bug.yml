name: Bug 修复
description: 创建一个缺陷修复 ticket
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 说明实际行为、期望行为和影响范围。
      placeholder: 实际发生了什么？应该发生什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 用最小步骤描述如何复现。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 修复完成后必须满足的条件。
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: 回归测试
      description: 写明新增测试、边界场景和验证命令。
      placeholder: |
        - [ ] 新增失败用例覆盖该 bug
        - [ ] bun test
        - [ ] bun coverage 达到 100%
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: 关联资料
      description: 关联设计文档、日志、截图或相关 Issue。
    validations:
      required: false
